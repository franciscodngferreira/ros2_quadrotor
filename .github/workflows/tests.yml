name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: zero-Gazebo checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          # Required: the default glob is **/requirements.txt, and a miss errors
          # the job rather than skipping the cache.
          cache-dependency-path: requirements-dev.txt

      # No ROS/Gazebo on purpose — the checks are pure math and conftest stubs
      # the imports. Installing ROS Jazzy would cost minutes and test nothing extra.
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  lint:
    name: syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # The ROS-dependent sources the smoke job can't import otherwise only fail
      # at runtime on a live sim — a slow way to find a typo.
      - name: Byte-compile all sources
        run: |
          python -m compileall -q \
            src/quadrotor_sim/quadrotor_sim scripts tests

      - name: Validate SDF/world XML
        run: |
          python - <<'PY'
          import glob, sys, xml.dom.minidom as m
          bad = []
          for f in glob.glob('src/quadrotor_sim/**/*.sdf', recursive=True):
              try:
                  m.parse(f)
                  print(f'ok   {f}')
              except Exception as e:
                  bad.append((f, e))
                  print(f'FAIL {f}: {e}')
          sys.exit(1 if bad else 0)
          PY

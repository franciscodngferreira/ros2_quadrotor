[pytest]
# tests/ only: train/test_reset_timing.py matches test_* but drives a live sim,
# and build/ install/ hold colcon copies of everything.
testpaths = tests
norecursedirs = build install log .git hover_tensorboard checkpoints*
# Sourcing ROS registers these pytest11 plugins; launch_testing imports lark,
# which rl_venv lacks, killing collection. No-ops in CI.
addopts = -q --strict-markers
    -p no:launch_testing
    -p no:launch_ros
    -p no:ament_lint
    -p no:ament_flake8
    -p no:ament_copyright
    -p no:ament_pep257
    -p no:ament_xmllint

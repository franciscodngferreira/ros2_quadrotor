[pytest]
# Collect only from tests/. Two things in the tree would otherwise be picked up
# and hang or fail without a live Gazebo:
#   src/quadrotor_sim/quadrotor_sim/train/test_reset_timing.py — a reset-timing
#     diagnostic that drives a real sim, despite the test_ prefix
#   build/ and install/ — colcon copies, which would collect the same files twice
testpaths = tests
norecursedirs = build install log .git hover_tensorboard checkpoints*
# Sourcing ROS puts /opt/ros/jazzy on the path, which registers several pytest11
# entry points that get auto-loaded. launch_testing imports lark, which is not in
# the RL venv, so plain `pytest` dies before collecting anything. None of them are
# wanted here. Harmless no-ops in CI, where these packages do not exist.
addopts = -q --strict-markers
    -p no:launch_testing
    -p no:launch_ros
    -p no:ament_lint
    -p no:ament_flake8
    -p no:ament_copyright
    -p no:ament_pep257
    -p no:ament_xmllint
